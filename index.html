<body><h1>🌪️ StormTracker Live</h1>

<h2><span id="greeting"></span></h2><script>
function updateGreeting() {
    const hour = new Date().getHours();

    if (hour < 12) {
        document.getElementById("greeting").textContent =
            "🌞 Good Morning!";
    }
    else if (hour < 18) {
        document.getElementById("greeting").textContent =
            "☀️ Good Afternoon!";
    }
    else {
        document.getElementById("greeting").textContent =
            "🌆 Good Evening!";
    }
}
